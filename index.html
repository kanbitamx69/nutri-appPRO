<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUTRIPRO ROSA</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f3e5f5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --primary: #9c27b0; --accent: #e91e63;
            --warn: #ff9800; --text: #2d3436; --border: #e0e0e0;
        }

        body { background-color: var(--bg); margin: 0; color: var(--text); font-family: 'Inter', sans-serif; }

        #app-industrial .main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 20px; border-bottom: 1px solid var(--border); background: var(--card);
        }

        #app-industrial .avatar-frame {
            width: 65px; height: 65px; border-radius: 15px; border: 2px solid var(--primary);
            overflow: hidden; box-shadow: 0 4px 10px rgba(156, 39, 176, 0.2); cursor: pointer;
        }

        #app-industrial .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        #app-industrial .user-name { font-size: 16px; font-weight: 900; margin: 0; letter-spacing: 1px; color: var(--primary); }
        #app-industrial .user-badge { font-size: 10px; color: var(--accent); font-weight: bold; }

        #app-industrial .btn-top {
            border: none !important; color: #fff !important; font-weight: 800;
            font-size: 10px; padding: 10px 15px; border-radius: 8px;
            display: block; width: 110px; margin-bottom: 5px; cursor: pointer;
        }
        #app-industrial .reset { background-color: #d63031 !important; }
        #app-industrial .clear { background-color: #636e72 !important; }

        #app-industrial .streak-content {
            background: linear-gradient(135deg, #ffffff, #f3e5f5);
            border: 1px solid var(--primary); border-radius: 16px;
            margin: 10px 20px; padding: 15px; display: flex; align-items: center; justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        #app-industrial .streak-val { font-size: 32px; font-weight: 900; color: var(--primary); }

        #app-industrial .meal-selector { display: flex; gap: 8px; padding: 15px; }
        #app-industrial .tab {
            flex: 1; padding: 14px; background: #fff !important; border: 1px solid var(--border) !important;
            color: #b2bec3 !important; border-radius: 12px; font-weight: 800; cursor: pointer; text-align: center;
        }
        #app-industrial .tab.active { background: var(--primary) !important; color: #fff !important; border-color: var(--primary) !important; }

        #app-industrial .advice-neon-card {
            background: #fff !important; border: 2px solid var(--primary) !important;
            border-radius: 16px; margin: 0 15px 20px; padding: 20px;
            box-shadow: 0 4px 20px rgba(156, 39, 176, 0.1);
        }

        #app-industrial .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px 20px; }
        #app-industrial .ax-p-card {
            background: #fff !important; border: 1px solid var(--border) !important; padding: 15px;
            border-radius: 14px; font-size: 10px; text-align: center; cursor: pointer; color: #636e72;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        #app-industrial .ax-p-card.selected { border-color: var(--accent) !important; color: var(--accent) !important; background: #fff5f8 !important; }
        #app-industrial .ax-p-card.gold { border-color: var(--primary) !important; color: var(--primary) !important; }

        #app-industrial .ax-i-row { background: #fff !important; border: 1px solid var(--border) !important; padding: 18px; border-radius: 16px; margin: 0 15px 12px; }

        #app-industrial .receipt-carbon { background: #ffffff; border: 2px solid var(--primary); padding: 25px; border-radius: 12px; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #app-industrial .receipt-body div {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px dashed var(--border); font-family: monospace; font-size: 11px; color: var(--text);
        }
        .qty-text { color: var(--primary); font-weight: bold; }
        .hidden { display: none !important; }
        
        select { background: #fdfcff; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="app-industrial">
    <header class="main-header">
        <div class="user-profile">
            <div class="avatar-frame" onclick="document.getElementById('avatarInput').click()">
                <img id="userAvatar" src="https://via.placeholder.com/150/9c27b0/ffffff?text=Rosa" alt="Rosa">
                <input type="file" id="avatarInput" hidden onchange="loadAvatar(event)">
            </div>
            <div class="user-meta">
                <h1 class="user-name">ROSA</h1>
                <div class="user-badge">RETO • 1800 KCAL</div>
            </div>
        </div>
        <div class="top-actions">
            <button class="btn-top reset" onclick="hardResetReto()">RESET RETO</button>
            <button class="btn-top clear" onclick="clearSelection()">LIMPIAR</button>
        </div>
    </header>

    <main class="dashboard">
        <div class="streak-hero">
            <div class="streak-content">
                <span class="streak-label" style="color:var(--text)">RACHA ACTUAL</span>
                <span id="rachaCount" class="streak-val">0</span>
                <i class="fas fa-heart streak-icon" style="color:var(--accent)"></i>
            </div>
        </div>

        <nav class="meal-selector">
            <button onclick="setMeal('Desayuno')" id="btn-Desayuno" class="tab active">DESAYUNO</button>
            <button onclick="setMeal('Comida')" id="btn-Comida" class="tab">COMIDA</button>
            <button onclick="setMeal('Cena')" id="btn-Cena" class="tab">CENA</button>
        </nav>

        <section class="advice-block">
            <div class="advice-neon-card">
                <div class="advice-header" style="color: var(--primary); font-weight: bold;">
                    <i class="fas fa-leaf"></i> RECOMENDACIÓN TÉCNICA
                </div>
                <p id="activityText" style="font-size:12px; color:var(--text); margin-top:10px;">Iniciando plan Rosa...</p>
            </div>
        </section>

        <section class="module">
            <h3 style="font-size:10px; color:var(--primary); margin-left:20px;">OPCIONES SUGERIDAS</h3>
            <div id="menuOptions" class="menu-grid"></div>
        </section>

        <section class="module">
            <h3 style="font-size:10px; color:var(--primary); margin-left:20px;">CONTROL POR CATEGORÍA</h3>
            <div id="portionContainer" class="cat-list"></div>
        </section>

        <div class="bev-selection" style="padding:0 15px;">
            <div class="ax-i-row">
                <label style="font-size:10px; font-weight:bold; color:var(--primary)">🥤 OPCIÓN DE BEBIDA:</label>
                <select id="bevSelect" onchange="updateSummary()" style="width:100%; background:#fff; color:var(--text); border:1px solid var(--border); padding:12px; border-radius:10px; margin-top:10px;"></select>
            </div>
        </div>

        <section id="summaryCard" class="receipt-container hidden">
            <div class="receipt-carbon">
                <div class="receipt-head">
                    <h3 style="color:var(--primary); margin:0;">RESUMEN DE RACIONES</h3>
                    <div id="mealStamp" style="font-weight:900; font-size:20px; color:rgba(156,39,176,0.1); text-align:right;"></div>
                </div>
                <div id="summaryDetails" class="receipt-body"></div>
                <div class="receipt-footer" style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px; display:flex; justify-content:space-between; font-size:10px;">
                    <span>OBJETIVO DIARIO</span>
                    <span>1800 KCAL</span>
                </div>
                <button class="btn-confirm" onclick="completeDay()" style="width:100%; background:var(--accent); color:#fff; font-weight:bold; padding:15px; border-radius:10px; border:none; margin-top:15px; cursor:pointer;">REGISTRAR ÉXITO</button>
            </div>
        </section>
    </main>
</div>

<script>
const FOOD_DB = {
    "Verduras": [
        {n:"Espinaca",q:"2 tzas"},{n:"Tomate rojo",q:"1 pza"},{n:"Pepino",q:"1 tza"},{n:"Brócoli",q:"1/2 tza"},{n:"Calabacita",q:"1/2 tza"},
        {n:"Nopal",q:"2 pzas"},{n:"Ejote",q:"1/2 tza"},{n:"Zanahoria",q:"1/2 tza"},{n:"Champiñón",q:"1/2 tza"}
    ],
    "Frutas": [
        {n:"Manzana",q:"1 pza"},{n:"Plátano",q:"1/2 pza"},{n:"Fresas",q:"17 pzas"},{n:"Papaya",q:"1 tza"},{n:"Mango",q:"1/2 pza"},
        {n:"Uvas",q:"18 pzas"},{n:"Melón",q:"1 tza"},{n:"Piña",q:"3/4 tza"}
    ],
    "Cereales sin grasa": [
        {n:"Tortilla maíz",q:"1 pza"},{n:"Arroz cocido",q:"1/4 tza"},{n:"Avena hojuelas",q:"1/3 tza"},{n:"Pan integral",q:"1 reb"},{n:"Papa hervida",q:"1/2 pza"},
        {n:"Pasta",q:"1/2 tza"},{n:"Salmas",q:"1 paq"},{n:"Tostada horneada",q:"2 pzas"}
    ],
    "Leguminosas": [
        {n:"Frijoles",q:"1/2 tza"},{n:"Lentejas",q:"1/2 tza"},{n:"Garbanzo",q:"1/2 tza"},{n:"Habas",q:"1/2 tza"}
    ],
    "AOA Muy Bajo Aporte de Grasa": [
        {n:"Pechuga pollo",q:"30g"},{n:"Atún agua",q:"31g"},{n:"Pescado blanco",q:"40g"},{n:"Clara huevo",q:"2 pzas"}
    ],
    "AOA Moderado Aporte de Grasa": [
        {n:"Huevo entero",q:"1 pza"},{n:"Queso Oaxaca",q:"30g"},{n:"Carne molida res",q:"30g"},{n:"Queso Panela",q:"40g"}
    ],
    "AOA Alto Aporte de Grasa": [
        {n:"Queso Hebra",q:"30g"},{n:"Huevo revuelto",q:"1 pza"},{n:"Salchicha pavo",q:"1 pza"}
    ],
    "Leche Descremada": [
        {n:"Leche desc",q:"1 tza"},{n:"Yogurt s/az",q:"200g"},{n:"Yogurt Griego",q:"125g"}
    ],
    "Aceites sin Proteína": [
        {n:"Aguacate",q:"1/3 pza"},{n:"Aceite Oliva",q:"1 cdita"},{n:"Mantequilla",q:"1 cdita"}
    ]
};

// PLAN ACTUALIZADO PARA ROSA (1800 KCAL) SEGÚN TABLA
const PLAN = {
    Desayuno: { "Verduras":1, "Frutas":2, "Cereales sin grasa":2, "Leguminosas":1, "AOA Muy Bajo Aporte de Grasa":1, "Leche Descremada":1, "Aceites sin Proteína":1 },
    Comida: { "Verduras":2, "Frutas":2, "Cereales sin grasa":2, "AOA Moderado Aporte de Grasa":2, "Aceites sin Proteína":2 },
    Cena: { "Verduras":2, "Frutas":1, "Cereales sin grasa":2, "AOA Alto Aporte de Grasa":1.5, "Aceites sin Proteína":1 }
};

const PRESETS = {
    Desayuno: [
        { t: "Omelette de Claras", f: { "AOA Muy Bajo Aporte de Grasa":"Clara huevo", "Verduras":"Espinaca" }},
        { t: "Avena con Fresas", f: { "Cereales sin grasa":"Avena hojuelas", "Leche Descremada":"Leche desc", "Frutas":"Fresas" }},
        { t: "Molletes de Frijol", f: { "Cereales sin grasa":"Pan integral", "Leguminosas":"Frijoles" }},
        { t: "Yogurt con Papaya", f: { "Leche Descremada":"Yogurt Griego", "Frutas":"Papaya" }}
    ],
    Comida: [
        { t: "Pollo con Arroz", f: { "AOA Moderado Aporte de Grasa":"Carne molida res", "Cereales sin grasa":"Arroz cocido", "Verduras":"Calabacita" }},
        { t: "Bistec con Papa", f: { "AOA Moderado Aporte de Grasa":"Queso Oaxaca", "Cereales sin grasa":"Papa hervida", "Verduras":"Tomate rojo" }},
        { t: "Tacos de Pollo", f: { "AOA Moderado Aporte de Grasa":"Queso Panela", "Cereales sin grasa":"Tortilla maíz", "Verduras":"Pepino" }}
    ],
    Cena: [
        { t: "Quesadilla Rosa", f: { "Cereales sin grasa":"Tortilla maíz", "AOA Alto Aporte de Grasa":"Queso Hebra", "Verduras":"Nopal" }},
        { t: "Sincronizada Ligera", f: { "Cereales sin grasa":"Tortilla maíz", "AOA Alto Aporte de Grasa":"Salchicha pavo" }},
        { t: "Huevo con Nopal", f: { "AOA Alto Aporte de Grasa":"Huevo revuelto", "Verduras":"Nopal" }}
    ]
};

const BEVS = ["Agua Simple", "Té Verde", "Jamaica s/a", "Agua Limón", "Infusión Frutos", "Agua Mineral"];
const TIPS = { Desayuno: "HIDRATACIÓN: Inicia con 1 vaso de agua.", Comida: "DIGESTIÓN: Camina 10 min después de comer.", Cena: "RELAX: Cenar 2 horas antes de dormir." };

let currentMeal = 'Desayuno', selections = {}, enabledCats = {}, racha = parseInt(localStorage.getItem('rosa_r')) || 0;

function setMeal(meal) {
    currentMeal = meal;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === `btn-${meal}`));
    document.getElementById('activityText').innerText = TIPS[meal];
    clearSelection();
}

function selectMenu(idx) {
    const menu = PRESETS[currentMeal][idx];
    if(!menu) return;
    const isAlreadySelected = selections[Object.keys(menu.f)[0]]?.from === menu.t;
    if (isAlreadySelected) {
        for (let c in menu.f) { delete selections[c]; }
    } else {
        for (let c in menu.f) { selections[c] = { name: menu.f[c], from: menu.t }; enabledCats[c] = true; }
    }
    renderMenus(); renderPortions(); updateSummary();
}

function renderPortions() {
    const container = document.getElementById('portionContainer'); container.innerHTML = '';
    Object.keys(PLAN[currentMeal]).forEach(cat => {
        const targetQty = PLAN[currentMeal][cat] || 0;
        enabledCats[cat] = targetQty > 0;
        const sel = selections[cat] || { name: "" };
        if(targetQty > 0) {
            container.innerHTML += `<div class="ax-i-row">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-weight:bold; font-size:12px; color:var(--primary)">${cat}</span>
                    <span style="color:var(--accent); font-weight:900; font-size:10px;">${targetQty} RAC.</span>
                </div>
                <select onchange="manualSelect('${cat}', this)" style="width:100%; background:#fff; color:var(--text); border:1px solid var(--border); padding:12px; border-radius:10px;">
                    <option value="">-- Seleccionar --</option>
                    ${FOOD_DB[cat].map(f => `<option value="${f.n}" ${f.n === sel.name ? 'selected' : ''}>${f.n} (${f.q})</option>`).join('')}
                </select>
            </div>`;
        }
    });
}

function updateSummary() {
    const card = document.getElementById('summaryCard'), details = document.getElementById('summaryDetails');
    const active = Object.keys(selections).filter(c => PLAN[currentMeal][c] > 0 && selections[c].name);
    card.classList.toggle('hidden', active.length === 0);
    document.getElementById('mealStamp').innerText = currentMeal.toUpperCase();
    
    details.innerHTML = active.map(c => {
        const foodName = selections[c].name;
        const foodData = FOOD_DB[c].find(f => f.n === foodName);
        return `<div><b>[${c}]</b> <span><span class="qty-text">${PLAN[currentMeal][c]}x</span> ${foodName} (${foodData.q})</span></div>`;
    }).join('') + `<div><b>[BEBIDA]</b> <span>${document.getElementById('bevSelect').value}</span></div>`;
}

function renderMenus() {
    const cont = document.getElementById('menuOptions');
    cont.innerHTML = PRESETS[currentMeal].map((m, idx) => {
        const isSel = (selections[Object.keys(m.f)[0]]?.from === m.t);
        return `<div class="ax-p-card ${isSel ? 'selected' : ''}" onclick="selectMenu(${idx})">${m.t}</div>`;
    }).join('');
}

function manualSelect(cat, el) { if (el.value) selections[cat] = { name: el.value, from: "Manual" }; else delete selections[cat]; updateSummary(); renderMenus(); }
function clearSelection() { selections = {}; renderMenus(); renderPortions(); updateSummary(); }
function hardResetReto() { if(confirm("¿RESET TOTAL?")) { localStorage.clear(); window.location.reload(true); }}
function completeDay() { racha++; localStorage.setItem('rosa_r', racha); document.getElementById('rachaCount').innerText = racha; alert("¡Felicidades Rosa! Registro guardado."); }
function loadAvatar(e) { const r = new FileReader(); r.onload = () => { document.getElementById('userAvatar').src = r.result; localStorage.setItem('rosa_av', r.result); }; r.readAsDataURL(e.target.files[0]); }

window.onload = () => {
    const bev = document.getElementById('bevSelect'); BEVS.forEach(b => bev.innerHTML += `<option>${b}</option>`);
    document.getElementById('rachaCount').innerText = racha;
    const av = localStorage.getItem('rosa_av'); if(av) document.getElementById('userAvatar').src = av;
    setMeal('Desayuno');
};
</script>

</body>
</html>
