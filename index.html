<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUTRIPRO ROSA - SISTEMAS</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f3e5f5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg: #f8f7fa; --card: #ffffff; --primary: #8e24aa; --accent: #d81b60;
            --warn: #fb8c00; --text: #2d3436; --border: #e1bee7;
        }
        body { background-color: var(--bg); margin: 0; color: var(--text); font-family: 'Inter', sans-serif; }
        #app-industrial .main-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        #app-industrial .avatar-frame { width: 65px; height: 65px; border-radius: 15px; border: 2px solid var(--primary); overflow: hidden; box-shadow: 0 4px 12px rgba(142, 36, 170, 0.2); cursor: pointer; }
        #app-industrial .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        #app-industrial .user-name { font-size: 16px; font-weight: 900; margin: 0; letter-spacing: 1px; color: var(--primary); }
        #app-industrial .user-badge { font-size: 10px; color: var(--accent); font-weight: bold; }
        #app-industrial .btn-top { border: none !important; color: #fff !important; font-weight: 800; font-size: 10px; padding: 10px 15px; border-radius: 8px; display: block; width: 110px; margin-bottom: 5px; cursor: pointer; }
        #app-industrial .reset { background-color: #e53935 !important; }
        #app-industrial .clear { background-color: #757575 !important; }
        #app-industrial .streak-content { background: linear-gradient(135deg, #ffffff, #f3e5f5); border: 1px solid var(--primary); border-radius: 16px; margin: 10px 20px; padding: 15px; display: flex; align-items: center; justify-content: space-around; }
        #app-industrial .streak-val { font-size: 32px; font-weight: 900; color: var(--primary); }
        #app-industrial .meal-selector { display: flex; gap: 8px; padding: 15px; }
        #app-industrial .tab { flex: 1; padding: 14px; background: #fff !important; border: 1px solid var(--border) !important; color: #9e9e9e !important; border-radius: 12px; font-weight: 800; cursor: pointer; text-align: center; }
        #app-industrial .tab.active { background: var(--primary) !important; color: #fff !important; border-color: var(--primary) !important; }
        #app-industrial .advice-neon-card { background: #fff !important; border: 2px solid var(--primary) !important; border-radius: 16px; margin: 0 15px 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #app-industrial .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px 20px; }
        #app-industrial .ax-p-card { background: #fff !important; border: 1px solid var(--border) !important; padding: 15px; border-radius: 14px; font-size: 10px; text-align: center; cursor: pointer; color: #616161; }
        #app-industrial .ax-p-card.selected { border-color: var(--accent) !important; color: var(--accent) !important; background: #fce4ec !important; }
        #app-industrial .ax-p-card.gold { border-color: var(--warn) !important; color: var(--warn) !important; box-shadow: 0 0 8px rgba(251, 140, 0, 0.3); }
        #app-industrial .ax-i-row { background: #fff !important; border: 1px solid var(--border) !important; padding: 18px; border-radius: 16px; margin: 0 15px 12px; }
        #app-industrial .receipt-carbon { background: #ffffff; border: 2px solid var(--primary); padding: 25px; border-radius: 12px; margin: 20px; }
        #app-industrial .receipt-body div { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); font-family: monospace; font-size: 11px; }
        .qty-text { color: var(--primary); font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app-industrial">
    <header class="main-header">
        <div class="user-profile">
            <div class="avatar-frame" onclick="document.getElementById('avatarInput').click()">
                <img id="userAvatar" src="https://via.placeholder.com/150/f3e5f5/8e24aa?text=Rosa" alt="Rosa">
                <input type="file" id="avatarInput" hidden onchange="loadAvatar(event)">
            </div>
            <div class="user-meta">
                <h1 class="user-name">ROSA</h1>
                <div class="user-badge">SISTEMAS • 1800 KCAL</div>
            </div>
        </div>
        <div class="top-actions">
            <button class="btn-top reset" onclick="hardResetReto()">RESET RETO</button>
            <button class="btn-top clear" onclick="clearSelection()">LIMPIAR</button>
        </div>
    </header>

    <main class="dashboard">
        <div class="streak-hero">
            <div class="streak-content">
                <span class="streak-label">RACHA ACTUAL</span>
                <span id="rachaCount" class="streak-val">0</span>
                <i class="fas fa-heart streak-icon" style="color:var(--accent)"></i>
            </div>
        </div>

        <nav class="meal-selector">
            <button onclick="setMeal('Desayuno')" id="btn-Desayuno" class="tab active">DESAYUNO</button>
            <button onclick="setMeal('Comida')" id="btn-Comida" class="tab">COMIDA</button>
            <button onclick="setMeal('Cena')" id="btn-Cena" class="tab">CENA</button>
        </nav>

        <section class="advice-block">
            <div class="advice-neon-card">
                <div class="advice-header"><i class="fas fa-bolt" style="color:var(--primary)"></i> RECOMENDACIÓN TÉCNICA</div>
                <p id="activityText" style="font-size:12px; color:#666; margin-top:10px;">Cargando rutina Rosa...</p>
            </div>
        </section>

        <section class="module">
            <h3 style="font-size:10px; color:var(--primary); margin-left:20px;">PLATILLOS SUGERIDOS (20 OPCIONES)</h3>
            <div id="menuOptions" class="menu-grid"></div>
        </section>

        <section class="module">
            <h3 style="font-size:10px; color:var(--primary); margin-left:20px;">CONTROL POR CATEGORÍA</h3>
            <div id="portionContainer" class="cat-list"></div>
        </section>

        <div class="bev-selection" style="padding:0 15px;">
            <div class="ax-i-row">
                <label style="font-size:10px; font-weight:bold; color:var(--primary)">🥤 OPCIÓN DE BEBIDA:</label>
                <select id="bevSelect" onchange="updateSummary()" style="width:100%; background:#fff; color:#000; border:1px solid var(--border); padding:12px; border-radius:10px; margin-top:10px;"></select>
            </div>
        </div>

        <section id="summaryCard" class="receipt-container hidden">
            <div class="receipt-carbon">
                <div class="receipt-head">
                    <h3 style="color:var(--primary); margin:0;">DETALLE DE RACIONES</h3>
                    <div id="mealStamp" style="font-weight:900; font-size:20px; color:rgba(142,36,170,0.1); text-align:right;"></div>
                </div>
                <div id="summaryDetails" class="receipt-body"></div>
                <div class="receipt-footer" style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px; display:flex; justify-content:space-between; font-size:10px;">
                    <span>OBJETIVO DIARIO</span>
                    <span>1800 KCAL</span>
                </div>
                <button class="btn-confirm" onclick="completeDay()" style="width:100%; background:var(--accent); color:#fff; font-weight:bold; padding:15px; border-radius:10px; border:none; margin-top:15px; cursor:pointer;">REGISTRAR ÉXITO</button>
            </div>
        </section>
    </main>
</div>

        { t: "Pan con Pepperoni", f: { "Cereales sin grasa":"Pan integral", "AOA Muy Alto Grasa":"Pepperoni" }},
        { t: "Tostadas Chorizo", f: { "Cereales sin grasa":"Tostada horneada", "AOA Muy Alto Grasa":"Chorizo" }},
        { t: "Queso Crema Bowl", f: { "AOA Muy Alto Grasa":"Queso crema", "Cereales sin grasa":"Galletas Marías" }},
        { t: "Salami con Pan", f: { "Cereales sin grasa":"Bolillo", "AOA Muy Alto Grasa":"Salami" }},
        { t: "Quesadilla iOS", f: { "Cereales sin grasa":"Tortilla maíz", "AOA Muy Alto Grasa":"Queso Hebra" }},
        { t: "Tocino con Papa", f: { "AOA Muy Alto Grasa":"Tocino", "Cereales sin grasa":"Papa hervida" }},
        { t: "Pepperoni Salmas", f: { "AOA Muy Alto Grasa":"Pepperoni", "Cereales sin grasa":"Salmas" }},
        { t: "Sándwich Manchego", f: { "AOA Muy Alto Grasa":"Queso Manchego", "Cereales sin grasa":"Pan integral" }},
        { t: "Hebra Fundida", f: { "AOA Muy Alto Grasa":"Queso Hebra", "Verduras":"Champiñón" }},
        { t: "Crema en Pan", f: { "Cereales sin grasa":"Pan integral", "AOA Muy Alto Grasa":"Queso crema" }},
        { t: "Rollitos Amarillo", f: { "AOA Muy Alto Grasa":"Queso Amarillo" }},
        { t: "Torta de Chorizo", f: { "Cereales sin grasa":"Bolillo", "AOA Muy Alto Grasa":"Chorizo" }},
        { t: "Nopal con Hebra", f: { "Cereales sin grasa":"Tortilla maíz", "AOA Muy Alto Grasa":"Queso Hebra" }},
        { t: "Salami Galletas", f: { "AOA Muy Alto Grasa":"Salami", "Cereales sin grasa":"Galletas Marías" }},
        { t: "Mix Rosa Cena", f: { "Cereales sin grasa":"Salmas", "AOA Muy Alto Grasa":"Queso crema" }}
    ]
};

const BEVS = ["Agua Simple", "Té Verde", "Café Negro", "Jamaica s/a", "Agua Limón", "Infusión Frutos", "Agua Mineral", "Té Canela", "Clorofila", "Pepino/Menta"];
const TIPS = { Desayuno: "ESTIRAMIENTOS: 10 min de movilidad dinámica.", Comida: "DIGESTIÓN: Camina 15 min a paso ligero.", Cena: "RELAX: 5 min de respiración y fuera pantallas." };

let currentMeal = 'Desayuno', selections = {}, enabledCats = {}, racha = parseInt(localStorage.getItem('alex_r')) || 0;

function setMeal(meal) {
    currentMeal = meal;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === `btn-${meal}`));
    document.getElementById('activityText').innerText = TIPS[meal];
    clearSelection();
}

function selectMenu(idx) {
    const menu = PRESETS[currentMeal][idx];
    const isAlreadySelected = selections[Object.keys(menu.f)[0]]?.from === menu.t;
    if (isAlreadySelected) {
        for (let c in menu.f) { delete selections[c]; }
    } else {
        let collision = false;
        for (let c in menu.f) { if (selections[c] && selections[c].from === "Manual") collision = true; }
        if (collision) { alert("⚠️ COLISIÓN: Categorías manuales ocupadas."); return; }
        for (let c in menu.f) { selections[c] = { name: menu.f[c], from: menu.t }; enabledCats[c] = true; }
    }
    renderMenus(); renderPortions(); updateSummary();
}

function renderPortions() {
    const container = document.getElementById('portionContainer'); container.innerHTML = '';
    Object.keys(FOOD_DB).forEach(cat => {
        const targetQty = PLAN[currentMeal][cat] || 0;
        if(enabledCats[cat] === undefined) enabledCats[cat] = targetQty > 0;
        const sel = selections[cat] || { name: "" };
        container.innerHTML += `<div class="ax-i-row" style="${enabledCats[cat] ? '' : 'opacity: 0.4'}">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:bold; font-size:12px;">${cat}</span>
                <div style="display:flex; gap:10px;"><span style="color:var(--primary); font-weight:900; font-size:10px;">${targetQty} RAC.</span>
                <input type="checkbox" ${enabledCats[cat]?'checked':''} onchange="toggleCat('${cat}', this.checked)"></div>
            </div>
            <select onchange="manualSelect('${cat}', this)" ${!enabledCats[cat]?'disabled':''} style="width:100%; background:#fff; color:#000; border:1px solid var(--border); padding:12px; border-radius:10px;">
                <option value="">-- Seleccionar --</option>
                ${FOOD_DB[cat].map(f => `<option value="${f.n}" ${f.n === sel.name ? 'selected' : ''}>${f.n} (${f.q})</option>`).join('')}
            </select>
        </div>`;
    });
}

function updateSummary() {
    const card = document.getElementById('summaryCard'), details = document.getElementById('summaryDetails');
    const active = Object.keys(selections).filter(c => enabledCats[c] && selections[c].name);
    card.classList.toggle('hidden', active.length === 0);
    document.getElementById('mealStamp').innerText = currentMeal.toUpperCase();
    
    details.innerHTML = active.map(c => {
        const foodName = selections[c].name;
        const foodData = FOOD_DB[c].find(f => f.n === foodName);
        return `<div><b>[${c}]</b> <span><span class="qty-text">${PLAN[currentMeal][c] || 0}x</span> ${foodName} (${foodData.q})</span></div>`;
    }).join('') + `<div><b>[BEBIDA]</b> <span>${document.getElementById('bevSelect').value}</span></div>`;
}

function renderMenus() {
    const cont = document.getElementById('menuOptions');
    cont.innerHTML = PRESETS[currentMeal].map((m, idx) => {
        const isSel = (selections[Object.keys(m.f)[0]]?.from === m.t);
        const canFill = Object.keys(m.f).length > 0 && Object.keys(m.f).every(cat => !selections[cat]);
        return `<div class="ax-p-card ${isSel ? 'selected' : (canFill ? 'gold' : '')}" onclick="selectMenu(${idx})">${m.t}</div>`;
    }).join('');
}

function manualSelect(cat, el) { if (el.value) selections[cat] = { name: el.value, from: "Manual" }; else delete selections[cat]; updateSummary(); renderMenus(); }
function toggleCat(cat, isEn) { enabledCats[cat] = isEn; renderPortions(); updateSummary(); renderMenus(); }
function clearSelection() { selections = {}; enabledCats = {}; renderMenus(); renderPortions(); updateSummary(); }
function hardResetReto() { if(confirm("¿RESET TOTAL?")) { localStorage.clear(); window.location.reload(true); }}
function completeDay() { racha++; localStorage.setItem('alex_r', racha); document.getElementById('rachaCount').innerText = racha; alert("Éxito registrado."); }
function loadAvatar(e) { const r = new FileReader(); r.onload = () => { document.getElementById('userAvatar').src = r.result; localStorage.setItem('alex_av', r.result); }; r.readAsDataURL(e.target.files[0]); }

window.onload = () => {
    const bev = document.getElementById('bevSelect'); BEVS.forEach(b => bev.innerHTML += `<option>${b}</option>`);
    document.getElementById('rachaCount').innerText = racha;
    const av = localStorage.getItem('alex_av'); if(av) document.getElementById('userAvatar').src = av;
    setMeal('Desayuno');
};
</script>

</body>
</html>
