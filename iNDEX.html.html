<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NutriPro iOS</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000; --ios-card: #1C1C1E; --ios-blue: #0A84FF;
            --ios-green: #30D158; --ios-text: #FFF; --ios-sec: #8E8E93;
        }
        body {
            background: var(--ios-bg); color: var(--ios-text);
            font-family: -apple-system, system-ui, sans-serif; margin: 0;
            padding-bottom: 50px; -webkit-user-select: none;
        }
        .header { padding: 40px 20px 20px; border-bottom: 1px solid #222; }
        .header h1 { font-size: 32px; margin: 0; font-weight: 700; }
        .streak-box {
            background: var(--ios-card); margin: 20px; padding: 20px;
            border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .streak-val { font-size: 42px; font-weight: 800; color: #FF9F0A; }
        .meal-tabs { display: flex; background: #1C1C1E; margin: 0 20px 20px; padding: 2px; border-radius: 10px; }
        .tab-btn { flex: 1; border: none; background: none; color: #fff; padding: 10px; font-weight: 600; border-radius: 8px; }
        .tab-btn.active { background: #636366; }
        .section-label { padding: 0 20px; color: var(--ios-sec); font-size: 13px; text-transform: uppercase; margin-bottom: 8px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-bottom: 25px; }
        .menu-card { background: var(--ios-card); border-radius: 16px; padding: 15px; font-weight: 600; border: 2px solid transparent; transition: 0.2s; }
        .menu-card.active { border-color: var(--ios-blue); background: rgba(10,132,255,0.1); }
        .ios-list { background: var(--ios-card); margin: 0 20px 20px; border-radius: 14px; overflow: hidden; }
        .ios-row { padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        select { background: none; border: none; color: var(--ios-blue); font-size: 16px; width: 60%; text-align: right; outline: none; }
        .summary { background: #FFF; color: #000; margin: 20px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sum-item { margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 10px; }
        .sum-item:last-child { border: none; }
        .sum-item b { font-size: 11px; color: var(--ios-blue); text-transform: uppercase; }
        .sum-item p { margin: 5px 0; font-weight: 700; font-size: 14px; }
        .qty { color: #555; font-size: 12px; font-weight: 400; }
        .btn-main { width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--ios-blue); color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <p style="color:var(--ios-sec); margin:0;">NUTRISYSTEMS PREMIUM</p>
        <h1>Alexis Salazar</h1>
    </div>

    <div class="streak-box">
        <div><p style="margin:0; font-size:12px; font-weight:600;">RACHA ACTUAL</p><span id="racha" class="streak-val">0</span></div>
        <i class="fas fa-fire" style="color:#FF9F0A; font-size:35px;"></i>
    </div>

    <div class="meal-tabs">
        <button class="tab-btn active" onclick="changeMeal('Desayuno', this)">Desayuno</button>
        <button class="tab-btn" onclick="changeMeal('Comida', this)">Comida</button>
        <button class="tab-btn" onclick="changeMeal('Cena', this)">Cena</button>
    </div>

    <p class="section-label">Platillos iOS Premium</p>
    <div id="menuGrid" class="menu-grid"></div>

    <p class="section-label">Detalle de Raciones</p>
    <div id="catList" class="ios-list"></div>

    <div id="summaryCard" class="summary hidden">
        <div id="sumBody"></div>
        <button class="btn-main btn-primary" onclick="confirmDay()">Registrar como Logrado</button>
    </div>

<script>
    // Se mantiene la base de datos detallada
    const FOOD_DB = {
        "Verduras": [{n:"Espinaca",q:"2 tzas"},{n:"Tomate rojo",q:"1 pza"},{n:"Pepino",q:"1 tza"},{n:"Brócoli",q:"1/2 tza"},{n:"Calabacita",q:"1/2 tza"},{n:"Nopal",q:"2 pzas"}],
        "Frutas": [{n:"Manzana",q:"1 pza"},{n:"Plátano",q:"1/2 pza"},{n:"Fresas",q:"17 pzas"},{n:"Papaya",q:"1 tza"},{n:"Mango",q:"1/2 pza"}],
        "Cereales sin grasa": [{n:"Tortilla maíz",q:"1 pza"},{n:"Arroz cocido",q:"1/4 tza"},{n:"Avena",q:"1/3 tza"},{n:"Pan integral",q:"1 reb"},{n:"Salmas",q:"1 paq"}],
        "Leguminosas": [{n:"Frijoles",q:"1/2 tza"},{n:"Lentejas",q:"1/2 tza"}],
        "AOA Bajo Grasa": [{n:"Pechuga pollo",q:"30g"},{n:"Atún agua",q:"31g"},{n:"Bistec Res",q:"25g"}],
        "AOA Moderado Grasa": [{n:"Huevo entero",q:"1 pza"},{n:"Queso Oaxaca",q:"30g"}],
        "AOA Muy Alto Grasa": [{n:"Queso Hebra",q:"30g"},{n:"Salami",q:"30g"}],
        "Leche Descremada": [{n:"Leche desc",q:"1 tza"},{n:"Yogurt Griego",q:"125g"}],
        "Aceites sin Proteína": [{n:"Aguacate",q:"1/3 pza"},{n:"Aceite Oliva",q:"1 cdita"}]
    };

    const PLAN = {
        Desayuno: { "Verduras":2, "Frutas":2, "Cereales sin grasa":4, "Leguminosas":1, "AOA Moderado Grasa":2, "Leche Descremada":1, "Aceites sin Proteína":2 },
        Comida: { "Verduras":1, "Frutas":2, "Cereales sin grasa":4, "Leguminosas":1, "AOA Bajo Grasa":4, "Aceites sin Proteína":2 },
        Cena: { "Verduras":1, "Frutas":1, "Cereales sin grasa":2, "AOA Muy Alto Grasa":2, "Aceites sin Proteína":0.5 }
    };

    const PRESETS = {
        Desayuno: [{ t: "Omelette de Queso", f: { "AOA Moderado Grasa":"Queso Oaxaca", "Verduras":"Espinaca" }}, { t: "Avena Real", f: { "Cereales sin grasa":"Avena", "Leche Descremada":"Leche desc", "Frutas":"Fresas" }}],
        Comida: [{ t: "Bistec con Arroz", f: { "AOA Bajo Grasa":"Bistec Res", "Cereales sin grasa":"Arroz cocido" }}, { t: "Pollo & Brócoli", f: { "AOA Bajo Grasa":"Pechuga pollo", "Verduras":"Brócoli" }}],
        Cena: [{ t: "Quesadilla Hebra", f: { "Cereales sin grasa":"Tortilla maíz", "AOA Muy Alto Grasa":"Queso Hebra" }}]
    };

    let currentMeal = 'Desayuno', selections = {}, selectedT = "";
    // Clave de racha independiente para la App Pro
    let racha = parseInt(localStorage.getItem('alex_r_pro')) || 0;

    function render() {
        document.getElementById('racha').innerText = racha;
        const grid = document.getElementById('menuGrid'); grid.innerHTML = '';
        PRESETS[currentMeal].forEach(m => {
            grid.innerHTML += `<div class="menu-card ${selectedT===m.t?'active':''}" onclick="applyP('${m.t}')">${m.t}</div>`;
        });
        const cats = document.getElementById('catList'); cats.innerHTML = '';
        Object.keys(PLAN[currentMeal]).forEach(c => {
            cats.innerHTML += `<div class="ios-row"><span>${c}</span><select onchange="selM('${c}', this.value)"><option value="">-</option>${FOOD_DB[c].map(f => `<option value="${f.n}" ${selections[c]===f.n?'selected':''}>${f.n}</option>`).join('')}</select></div>`;
        });
        updateSum();
    }

    function applyP(t) {
        if(selectedT===t) { selections = {}; selectedT = ""; }
        else { selectedT = t; selections = {...PRESETS[currentMeal].find(x=>x.t===t).f}; }
        render();
    }

    function selM(c, v) { selectedT = ""; if(v) selections[c]=v; else delete selections[c]; updateSum(); }

    function updateSum() {
        const card = document.getElementById('summaryCard'), body = document.getElementById('sumBody');
        const keys = Object.keys(selections);
        card.classList.toggle('hidden', keys.length === 0);
        let h = `<div class="sum-item"><b>Nombre del Platillo</b><p>${selectedT || 'Mix Personalizado'}</p></div>`;
        keys.forEach(k => {
            const data = FOOD_DB[k].find(f => f.n === selections[k]);
            const rac = PLAN[currentMeal][k];
            h += `<div class="sum-item"><b>${k}</b><p>${selections[k]} <span class="qty">➔ ${rac} porción (${data.q} c/u)</span></p></div>`;
        });
        body.innerHTML = h;
    }

    function changeMeal(m, b) {
        currentMeal = m;
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        selections = {}; selectedT = ""; render();
    }

    function confirmDay() { 
        racha++; 
        localStorage.setItem('alex_r_pro', racha); 
        alert("¡Éxito Premium registrado!");
        location.reload(); 
    }

    window.onload = render;
</script>
</body>
</html>
